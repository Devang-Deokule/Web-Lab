<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Experiment 1 - Matomo Analytics</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <h1>Experiment 1: Web Analytics Using Matomo</h1>
    <p>
      This page demonstrates how to integrate Matomo, an open-source analytics tool.
      Replace the placeholder URL and Site ID in <strong>script.js</strong> with your own Matomo server details.
    </p>

    <section>
      <h2>What This Tracks</h2>
      <ul>
        <li>Page views</li>
        <li>Visit duration</li>
        <li>Custom button click event below</li>
      </ul>
    </section>

    <button id="trackButton" type="button">Track Sample Event</button>
    <p id="status" aria-live="polite"></p>
  </main>

  <script src="script.js"></script>
</body>
</html>
